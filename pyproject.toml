[project]
name = "flowa"
version = "0.1.0"
description = "Variant literature assessment pipeline with AI extraction"
readme = "README.md"
requires-python = "==3.13.*"
license = { file = "LICENSE" }
dependencies = [
    "boto3",
    "defusedxml",
    "fsspec",
    "gcsfs",  # GCS support for fsspec
    "httpx",
    "jinja2",
    "logfire",
    "pydantic-settings",
    "pypdf",
    "s3fs",   # S3/MinIO support for fsspec
    "tenacity",
    "typer",
]

[project.optional-dependencies]
# Require >=0.5.0 for `groundmark.convert.ModelConfig` (used by `flowa/convert.py`
# to plumb Bedrock cost-attribution ARNs separately from the model name).
# pydantic-ai-slim is also listed as a direct dep so the [tool.uv.sources] git
# pin below actually applies — without that, it'd be transitive-only via
# groundmark and uv would silently fall back to the PyPI version.
anthropic = ["groundmark[anthropic]>=0.5.0", "pydantic-ai-slim[anthropic]"]
bedrock = ["groundmark[bedrock]>=0.5.0", "pydantic-ai-slim[bedrock]"]
google = ["groundmark[google]>=0.5.0", "pydantic-ai-slim[google]"]
openai = ["groundmark[openai]>=0.5.0", "pydantic-ai-slim[openai]"]

[tool.uv]
# Supply-chain hygiene: only install package versions ≥ 7 days old. Pairs with
# the npm/pnpm `min-release-age` gates configured globally; this is the
# in-repo equivalent for the Python side so contributors and CI inherit it.
exclude-newer = "7 days"

# Pin pydantic-ai-slim to a fork of v1.83.0 with PR #4237 cherry-picked on top.
# PR #4237 adds Bedrock native structured output (`NativeOutput`) and strict tool
# calls, which enable constrained JSON sampling and eliminate retry loops on
# malformed `final_result` tool args. Fork branch: `v1.83.0+bedrock-strict` on
# https://github.com/lgruen-vcgs/pydantic-ai (rebased from
# https://github.com/shailendher/pydantic-ai/tree/feat/bedrock-native-output-support).
# Switch back to the upstream release once #4237 lands and is published to PyPI.
# Mirrors the same pin in ~/groundmark/pyproject.toml.
[tool.uv.sources]
pydantic-ai-slim = { git = "https://github.com/lgruen-vcgs/pydantic-ai", rev = "c908946f71cfafd1be18ade8d9cd1296fb6a5558", subdirectory = "pydantic_ai_slim" }

[dependency-groups]
dev = [
    "boto3-stubs[s3]",
    "ruff",
    "mypy",
    "pytest",
    "types-defusedxml",
    "pre-commit>=4.5.1",
]

[project.scripts]
flowa = "flowa.cli:app"

[tool.mypy]
python_version = "3.13"

[tool.ruff]
target-version = "py313"
line-length = 120
src = ["src"]

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "UP",     # pyupgrade - modernize Python code
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # Do not perform function call in argument defaults - false positive with Typer
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
