# Dependabot configuration for flowa.
#
# Strategy:
# - Weekly version-update PRs per ecosystem, grouped so minor/patch bumps land
#   in a single PR. Majors still get individual PRs so they can be reviewed in
#   isolation.
# - Security-update PRs (opened as soon as an advisory drops) use the same
#   per-ecosystem groups; that switch is toggled separately at
#   Settings -> Code security -> "Dependabot security updates" and is wired up
#   alongside this file.
# - 7-day cooldown matches the local supply-chain hygiene policy
#   (`min-release-age=7d` in pnpm's global config, `exclude-newer = "7 days"`
#   in each uv project). Without it Dependabot would happily open PRs that CI
#   then rejects because the new version is too fresh.
# - Review requests come from .github/CODEOWNERS. Dependabot's `reviewers:`
#   option was retired by GitHub in 2025 (it is now silently ignored), so the
#   code owner is what gets a review request on each PR. The weekly cadence
#   keeps the inbox manageable.
# - No explicit `labels:` — Dependabot applies its defaults (`dependencies`
#   plus the `python:uv` / `javascript:npm` ecosystem label, which it
#   auto-creates). Naming a label here that Dependabot does not auto-create
#   makes it error whenever that label is missing from the repo.

version: 2

updates:
  # npm / pnpm — covers the root pnpm-lock.yaml and every workspace package
  # (packages/*, examples/*). Dependabot follows the workspace graph
  # automatically; one entry here is enough.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 7
    # Hold the published UI peer deps on their current majors. @flowajs/react-
    # viewer declares @mantine/* and react / react-dom as peer dependencies
    # (^8 / ^18); downstream consumers of the published package are on those
    # majors (Mantine 8 / React 18). A major bump here drags the peer range
    # ahead of those consumers and forces them through a breaking upgrade, so
    # block majors for the @mantine/* family and the react stack until they
    # migrate in lockstep. Minor/patch within 8.x / 18.x still flow (the
    # npm-non-major group below).
    ignore:
      - dependency-name: "@mantine/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
    groups:
      npm-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # uv / Python — the flowa library project at the repo root.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 7
    groups:
      python-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # uv / Python — examples/demo-gateway is its own uv project with its own
  # uv.lock, so it needs its own entry.
  - package-ecosystem: "uv"
    directory: "/examples/demo-gateway"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 7
    groups:
      python-non-major:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
